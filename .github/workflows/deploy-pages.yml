name: Deploy landing site to GitHub Pages

# Publishes site/ to GitHub Pages. The site reuses the extension's core: the
# build step copies the shared modules from src/ into site/lib/ (which is
# gitignored — no committed duplication), then the whole site/ folder is
# uploaded as the Pages artifact. site/CNAME carries the custom domain.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Least-privilege token; Pages needs pages:write + id-token:write to deploy.
permissions:
  contents: read
  pages: write
  id-token: write

# Serialize deploys; don't cancel an in-progress one (avoids half-published sites).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Build site/lib (copy shared core from src/)
        run: sh site/build.sh

      # GitHub Pages behind Cloudflare: the edge caches assets by URL, so a
      # *changed* file (same name) keeps serving its stale cached copy after a
      # deploy. Stamp every local asset ref in index.html with the commit SHA so
      # each deploy points at brand-new URLs the edge has never cached.
      - name: Cache-bust local asset URLs
        run: |
          V="${GITHUB_SHA::8}"
          sed -i -E "s#(src|href)=\"(lib/[^\"?]+|app\.js|styles\.css)\"#\1=\"\2?v=$V\"#g" site/index.html
          echo "busted with v=$V:"; grep -oE "(src|href)=\"[^\"]+\?v=[^\"]+\"" site/index.html

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Upload site/ as the Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
